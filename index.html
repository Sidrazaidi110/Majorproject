<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Online Voting System v2.0</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --glass-bg: rgba(255, 255, 255, 0.95);
    }
    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: var(--primary-gradient);
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; color: #333;
    }
    .container {
      background: var(--glass-bg);
      padding: 30px; border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      margin: 20px; width: 90%; max-width: 600px;
      animation: slideUp 0.8s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    
    h1 { color: #fff; text-align: center; font-size: 2.2rem; margin-top: 30px; }
    label { font-weight: 600; display: block; margin-top: 15px; color: #555; }
    
    input, select {
      width: 100%; padding: 12px; margin-top: 5px;
      border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box;
    }
    
    button {
      background: var(--primary-gradient); color: white;
      padding: 15px; border: none; border-radius: 10px;
      width: 100%; margin-top: 20px; cursor: pointer;
      font-weight: bold; font-size: 1.1rem; transition: 0.3s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

    .chart-box { margin-top: 30px; padding: 15px; background: #fff; border-radius: 15px; }
    #timerSection { color: #fff; text-align: center; background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 50px; margin-bottom: 20px; }
  </style>
</head>
<body>

  <h1>🗳️ Smart Voting Portal</h1>

  <div id="timerSection">
    <span id="clock"></span> | <span id="countdown" style="color: #ffeb3b;"></span>
  </div>

  <div class="container" id="mainContainer">
    <div id="inputForm">
      <label>Voter Name</label>
      <input type="text" id="voterName" placeholder="Enter Full Name">
      
      <label>Aadhaar Number (Redacted)</label>
      <input type="text" id="aadharNumber" placeholder="12 Digit Number">
      
      <label>Choose Your Candidate</label>
      <select id="candidate">
        <option value="">-- Click to Select --</option>
        <option value="BJP">BJP</option>
        <option value="AAP">AAP</option>
        <option value="INC">INC</option>
      </select>

      <button onclick="submitVote()">Confirm & Cast Vote</button>
    </div>

    <div class="chart-box">
      <h3 style="text-align:center">Live Election Statistics</h3>
      <canvas id="voteChart"></canvas>
    </div>
  </div>

  <script>
    // Load data from LocalStorage or Start Fresh
    let votes = JSON.parse(localStorage.getItem('votes')) || { BJP: 0, AAP: 0, INC: 0 };
    let votedAadhars = JSON.parse(localStorage.getItem('votedAadhars')) || [];

    // Initialize Chart.js
    const ctx = document.getElementById('voteChart').getContext('2d');
    let voteChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['BJP', 'AAP', 'INC'],
        datasets: [{
          data: [votes.BJP, votes.AAP, votes.INC],
          backgroundColor: ['#ff9933', '#00a8e8', '#138808'],
          borderWidth: 2
        }]
      },
      options: { plugins: { legend: { position: 'bottom' } } }
    });

    function submitVote() {
      const name = document.getElementById('voterName').value;
      const aadhar = document.getElementById('aadharNumber').value;
      const candidate = document.getElementById('candidate').value;

      if(!name || aadhar.length < 12 || !candidate) {
        alert("Please provide valid details!"); return;
      }

      if(votedAadhars.includes(aadhar)) {
        alert("Error: This ID has already cast a vote!"); return;
      }

      // Process Vote
      votes[candidate]++;
      votedAadhars.push(aadhar);

      // Save to LocalStorage
      localStorage.setItem('votes', JSON.stringify(votes));
      localStorage.setItem('votedAadhars', JSON.stringify(votedAadhars));

      // Update Chart
      voteChart.data.datasets[0].data = [votes.BJP, votes.AAP, votes.INC];
      voteChart.update();

      alert(`Success! Thank you ${name}.`);
      document.getElementById('inputForm').reset();
    }

    // Simple Clock & Timer
    function updateClock() {
      document.getElementById("clock").innerText = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
